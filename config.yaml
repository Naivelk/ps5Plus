# --------- TU CUENTA ---------
# IMPORTANTE: los códigos de PS Plus están BLOQUEADOS POR REGIÓN. Un código
# comprado en Colombia no se canjea en una cuenta de EE.UU. ni al revés.
# Pon aquí la región de tu cuenta PSN: "US" o "CO".
# El bot te sigue mostrando las dos, pero marca con ⚠️ las que no te sirven.
mi_region: US

# Precio al que quieres que te avise como 🔥 CHOLLO (12 meses de Essential).
# Referencia: el precio de lista de 12 meses en EE.UU. es US$79.99, y en
# rebajas fuertes (Days of Play en junio, Black Friday) suele caer a la mitad.
# Ajusta estos números cuando lleves un par de semanas viendo precios reales.
precio_objetivo:
  USD: 45
  COP: 150000

# Suelo de plausibilidad: por debajo de esto NO es una suscripción de 12 meses.
# Sin esto, un titular como "Sony sube el precio de PS Plus a $10.99" (precio
# MENSUAL) se marcaba como 🔥 chollo por ser menor que 45.
precio_piso:
  USD: 25
  COP: 80000

