# --------- CUÁNTO Y CADA CUÁNTO ---------
max_dias_antiguedad: 5     # ignorar publicaciones más viejas que esto
max_por_resumen: 30        # tope de items por mensaje
ocultar_sospechosos: false # true = ni siquiera te muestra los 🔴

# --------- REDDIT (la fuente principal) ---------
# r/PS4Deals y r/GameDeals publican casi todos los descuentos de PS Plus con
# el precio en el título. Es RSS público: no hace falta API key.
reddit:
  # POCOS subs a propósito: cada sub es una petición, y Reddit corta con 429
  # si le caen varias seguidas. Estos tres son los que publican ofertas de
  # verdad. Añadir subs de charla (r/PS5, r/playstation) solo trae ruido y
  # gasta tu presupuesto de peticiones — probado.
  subs:
    - PS4Deals
    - GameDeals
    - ConsoleDeals
  # OJO: las comillas son obligatorias. Probado: `q=ps plus` devuelve CERO
  # resultados; con comillas devuelve decenas.
  consulta: '"ps plus" OR "playstation plus"'
  ventana: week            # hour | day | week | month
  limite: 50               # posts por sub (solo camino API)
  # Los tres de abajo solo aplican al camino RSS (sin credenciales de API).
  pausa_segundos: 15       # respiro entre subs: sin esto Reddit responde 429
  intentos: 3              # reintentos si aun así corta
  espera_429: 30           # segundos base de espera entre reintentos

# --------- FEEDS RSS (anuncios oficiales y noticias) ---------
feeds_rss:
  # Blog oficial de PlayStation: aquí caen Days of Play y las rebajas grandes.
  - "https://blog.playstation.com/feed/"
  # Noticias en inglés sobre descuentos de PS Plus.
  - "https://news.google.com/rss/search?q=%22PS+Plus%22+(deal+OR+discount+OR+sale)&hl=en-US&gl=US&ceid=US:en"
  - "https://news.google.com/rss/search?q=%22PlayStation+Plus%22+subscription+deal&hl=en-US&gl=US&ceid=US:en"
  # Ofertas de 12 meses / 1 año, que es lo que de verdad interesa comprar.
  - "https://news.google.com/rss/search?q=%22PS+Plus%22+(%2212+months%22+OR+%2212-month%22+OR+%221+year%22)&hl=en-US&gl=US&ceid=US:en"
  # Códigos y regalos. Trae bastante ruido del catálogo mensual, pero el
  # filtro ya lo descarta y de vez en cuando cae un regalo de verdad.
  - "https://news.google.com/rss/search?q=%22PS+Plus%22+(free+OR+giveaway)+code&hl=en-US&gl=US&ceid=US:en"
  # Noticias en español.
  - "https://news.google.com/rss/search?q=%22PlayStation+Plus%22+(oferta+OR+descuento+OR+rebaja)&hl=es-419&gl=CO&ceid=CO:es"
  # Precios en pesos colombianos. Es el único sitio de donde salen cifras en
  # COP, así que sin este feed el umbral en pesos casi nunca se dispara.
  - "https://news.google.com/rss/search?q=%22PlayStation+Plus%22+precio+Colombia&hl=es-419&gl=CO&ceid=CO:es"
